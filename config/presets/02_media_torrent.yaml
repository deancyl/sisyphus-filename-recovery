# Preset: Media / Torrent Recovery
# Best for: PT/BT downloads with garbled Chinese filenames.
# Focus: torrent bencode metadata, media file tags, release group prefix patterns.

preset:
  name: "Media & Torrent Recovery"
  description: "PT/BT download scenario. Reads torrent bencode + media metadata."

# Enable deep metadata extraction
metadata_priority: high

# Release group prefix patterns to help match
release_groups:
  - "HDSky"
  - "HDArea"
  - "CarPT"
  - "FRDS"
  - "CMCT"
  - "CSWEB"
  - "HDS-WEB"
  - "PTerWEB"
  - "HDTime"
  - "MTeam"
  - "TTG"

# Regex rules for torrent/media specific patterns
regex_rules:
  - pattern: "\\[й–їз†ёжћ»йЋ·зѓЅж•“йЏ‚г‚†е«№\\]"
    replace: ""
  - pattern: "\\[й”џж–¤ж‹·й”џж–¤ж‹·\\]"
    replace: ""
  - pattern: "й–їз†ёжћ»йЋ·з©‹([A-Z])"
    replace: "\\1"

# Skip: don't touch system/installer files
skip_patterns:
  - "^Recovered_"
  - "^_Trash"
  - "^_Sisyphus"
  - "\\.(exe|msi|apk|run|spk)$"
